<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/public/icon.png" type="image/png">
  <title>GhostPaper — Credit</title>
  <link rel="stylesheet" href="/public/style.css">
  <style>
    .credit-card {
      background: var(--bg1); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px; margin-bottom: 10px;
    }
    .credit-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
    .credit-card-name { font-size: 1rem; font-weight: 700; }
    .credit-card-mask { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
    .util-row { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--muted); margin-bottom: 6px; }
    .util-row span { font-weight: 700; color: var(--text); }
    .credit-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); border-radius: 8px; overflow: hidden; margin-top: 14px; }
    .credit-stat { background: var(--bg2); padding: 10px 14px; }
    .credit-stat-label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 3px; }
    .credit-stat-value { font-size: 0.95rem; font-weight: 700; }

    .loan-card {
      background: var(--bg1); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px; margin-bottom: 10px;
    }
    .loan-header { display: flex; justify-content: space-between; margin-bottom: 12px; }
    .loan-name { font-size: 0.95rem; font-weight: 700; }
    .loan-sub { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
    .loan-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); border-radius: 8px; overflow: hidden; }
    .loan-stat { background: var(--bg2); padding: 10px 14px; }
    .loan-stat-label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 3px; }
    .loan-stat-value { font-size: 0.88rem; font-weight: 700; }

    .trend-chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 99px; font-size: 0.72rem; font-weight: 700;
    }
    .trend-growing { background: rgba(255,77,77,0.12); color: var(--red); }
    .trend-shrinking { background: rgba(0,230,118,0.12); color: var(--green); }
    .trend-stable { background: rgba(200,255,0,0.12); color: var(--accent); }
    .trend-unknown { background: var(--bg2); color: var(--muted); }

    .calc-box {
      background: var(--bg1); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px; margin-bottom: 28px;
    }
    .calc-input-row {
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .calc-input-label { font-size: 0.82rem; color: var(--muted); white-space: nowrap; }
    .calc-input {
      width: 130px; padding: 8px 12px; background: var(--bg2);
      border: 1px solid var(--border2); border-radius: 6px;
      color: var(--text); font-size: 0.95rem; font-weight: 700;
    }
    .calc-input:focus { outline: none; border-color: var(--accent); }
    .calc-hint { font-size: 0.75rem; color: var(--muted); }
    .calc-results { margin-top: 16px; display: flex; flex-direction: column; gap: 2px; }
    .calc-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 10px; border-radius: 6px; font-size: 0.82rem;
    }
    .calc-row:nth-child(odd) { background: var(--bg2); }
    .calc-row-name { font-weight: 600; flex: 1; }
    .calc-row-alloc { color: var(--accent); font-weight: 700; width: 90px; text-align: right; }
    .calc-row-months { color: var(--muted); width: 70px; text-align: right; }
    .calc-row-interest { color: var(--red); width: 90px; text-align: right; }
    .calc-total-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 10px 0; margin-top: 6px; border-top: 1px solid var(--border);
      font-size: 0.82rem; font-weight: 700;
    }
    .calc-strategy {
      margin-top: 12px; padding: 10px 12px; border-radius: 6px;
      background: rgba(200,255,0,0.06); border: 1px solid rgba(200,255,0,0.15);
      font-size: 0.78rem; color: var(--muted); line-height: 1.6;
    }
    .calc-strategy strong { color: var(--accent); }
    .calc-min-row { display: flex; align-items: center; gap: 10px; }
    .calc-min-label { font-size: 0.82rem; width: 200px; flex-shrink: 0; }
    .calc-min-input {
      width: 100px; padding: 6px 10px; background: var(--bg2);
      border: 1px solid var(--border2); border-radius: 6px;
      color: var(--text); font-size: 0.88rem; font-weight: 700;
    }
    .calc-min-input:focus { outline: none; border-color: var(--accent); }
  </style>
</head>
<body>
  <nav class="nav">
    <a class="nav-brand" href="/"><img src="/public/icon.png" alt="GhostPaper"> GhostPaper</a>
    <div class="nav-links">

      <a class="nav-link" href="/reports">Reports</a>
      <a class="nav-link" href="/spending">Spending</a>
      <a class="nav-link active" href="/credit">Credit</a>
    </div>
    <div class="nav-right"></div>
  </nav>

  <div class="page">
    <div class="page-title">
      <h1>Credit</h1>
      <p>Utilization, interest costs, and payoff projections</p>
    </div>

    <div class="stat-grid stat-grid-4 mb-16" id="cc-summary" style="margin-bottom:28px">
      <div class="stat-cell"><span class="stat-label">Total balance</span><span class="stat-value mono" id="cc-total">—</span></div>
      <div class="stat-cell"><span class="stat-label">Total limit</span><span class="stat-value mono" id="cc-limit">—</span></div>
      <div class="stat-cell"><span class="stat-label">Utilization</span><span class="stat-value mono" id="cc-util">—</span></div>
      <div class="stat-cell"><span class="stat-label">Interest / mo</span><span class="stat-value mono" id="cc-interest">—</span></div>
    </div>

    <section style="margin-bottom:28px">
      <div class="section-header"><span class="section-title">Payoff calculator</span></div>
      <div class="calc-box">
        <div class="calc-input-row">
          <span class="calc-input-label">Total payment per paycheck</span>
          <input class="calc-input" id="paycheck-input" type="number" min="0" step="10" placeholder="e.g. 300" oninput="runCalc()">
          <span class="calc-hint" id="calc-monthly-hint"></span>
        </div>
        <div id="calc-minimums" style="margin-top:14px;display:none">
          <div style="font-size:0.72rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:8px">Minimum payment per card (monthly)</div>
          <div id="calc-min-inputs" style="display:flex;flex-direction:column;gap:8px"></div>
        </div>
        <div class="calc-results" id="calc-results"></div>
      </div>
    </section>

    <section>
      <div class="section-header">
        <span class="section-title">Credit cards</span>
        <span id="cc-trend"></span>
      </div>
      <div id="cc-cards"><div class="empty">Loading…</div></div>
    </section>

    <section>
      <div class="section-header"><span class="section-title">Loans</span></div>
      <div id="loan-cards"><div class="empty">Loading…</div></div>
    </section>
  </div>

  <script>
    const fmt = n => '$' + Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })
    const fmts = n => '$' + Math.abs(n).toLocaleString('en-US', { maximumFractionDigits: 0 })

    function utilColor(u) { return u >= 50 ? 'red' : u >= 30 ? 'orange' : 'green' }
    function barColor(u) { return u >= 50 ? 'red' : u >= 30 ? 'orange' : 'green' }

    function trendChip(t) {
      const map = { growing: ['trend-growing','↑ Growing'], shrinking: ['trend-shrinking','↓ Shrinking'], stable: ['trend-stable','→ Stable'], unknown: ['trend-unknown','Unknown'] }
      const [cls, label] = map[t] ?? map.unknown
      return `<span class="trend-chip ${cls}">${label}</span>`
    }

    let ccData = []

    function payoffMonthsWithPayment(balance, apr, monthlyPayment) {
      if (balance <= 0) return 0
      const monthlyRate = apr / 100 / 12
      if (monthlyRate === 0) return Math.ceil(balance / monthlyPayment)
      if (monthlyPayment <= balance * monthlyRate) return Infinity
      return Math.ceil(-Math.log(1 - (monthlyRate * balance) / monthlyPayment) / Math.log(1 + monthlyRate))
    }

    function totalInterest(balance, apr, monthlyPayment) {
      if (balance <= 0 || monthlyPayment <= 0) return 0
      const monthlyRate = apr / 100 / 12
      let b = balance, interest = 0, months = 0
      while (b > 0 && months < 600) {
        const int = b * monthlyRate
        interest += int
        b = b + int - monthlyPayment
        if (b < 0) b = 0
        months++
      }
      return interest
    }

    function renderMinInputs() {
      const cards = ccData.filter(c => c.balance > 0).sort((a, b) => b.apr - a.apr)
      if (!cards.length) return
      const container = document.getElementById('calc-min-inputs')
      container.innerHTML = cards.map((c, i) => `
        <div class="calc-min-row">
          <span class="calc-min-label">${c.name}</span>
          <input class="calc-min-input" id="min-${i}" type="number" min="0" step="5" placeholder="min payment" oninput="runCalc()">
        </div>`).join('')
      document.getElementById('calc-minimums').style.display = 'block'
    }

    function getCardMin(i, card) {
      const val = parseFloat(document.getElementById(`min-${i}`)?.value)
      if (!isNaN(val) && val > 0) return val
      // fallback estimate if not entered
      const monthlyRate = card.apr / 100 / 12
      return Math.max(25, card.balance * 0.01 + card.balance * monthlyRate)
    }

    function runCalc() {
      if (!ccData.length) return
      const perPaycheck = parseFloat(document.getElementById('paycheck-input').value) || 0
      const perMonth = perPaycheck * 2
      const hint = document.getElementById('calc-monthly-hint')
      const resultsEl = document.getElementById('calc-results')

      if (perPaycheck <= 0) { hint.textContent = ''; resultsEl.innerHTML = ''; return }
      hint.textContent = `= ${fmt(perMonth)} / month`

      // Avalanche: sort by APR descending, allocate minimums first then extra to highest APR
      const cards = ccData.filter(c => c.balance > 0).sort((a, b) => b.apr - a.apr)
      if (!cards.length) { resultsEl.innerHTML = '<div style="color:var(--muted);font-size:0.82rem;padding:8px 0">No balances to pay off.</div>'; return }

      const mins = cards.map((c, i) => getCardMin(i, c))
      const totalMins = mins.reduce((s, m) => s + m, 0)
      const extra = Math.max(0, perMonth - totalMins)

      // Allocate: each card gets its minimum, highest-APR card gets all extra
      const allocs = mins.map((m, i) => i === 0 ? m + extra : m)

      // Per-card payoff simulation
      const rows = cards.map((c, i) => {
        const payment = allocs[i]
        const months = payoffMonthsWithPayment(c.balance, c.apr, payment)
        const interest = totalInterest(c.balance, c.apr, payment)
        const perPaycheckAlloc = payment / 2
        return { c, payment, perPaycheckAlloc, months, interest }
      })

      const totalInterestCost = rows.reduce((s, r) => s + r.interest, 0)
      const maxMonths = rows.reduce((s, r) => Math.max(s, r.months === Infinity ? 9999 : r.months), 0)

      const colHeaders = `
        <div class="calc-row" style="font-size:0.7rem;color:var(--muted);font-weight:700;padding-bottom:4px">
          <span class="calc-row-name">Card</span>
          <span class="calc-row-alloc" style="color:var(--muted)">Per paycheck</span>
          <span class="calc-row-alloc" style="color:var(--muted)">Per month</span>
          <span class="calc-row-months" style="color:var(--muted)">Payoff</span>
          <span class="calc-row-interest" style="color:var(--muted)">Interest</span>
        </div>`

      const cardRows = rows.map(r => {
        const monthsLabel = r.months === Infinity ? '∞' : r.months === 0 ? '—' : r.months + ' mo'
        return `<div class="calc-row">
          <span class="calc-row-name">${r.c.name}</span>
          <span class="calc-row-alloc">${fmt(r.perPaycheckAlloc)}</span>
          <span class="calc-row-alloc" style="color:var(--muted)">${fmt(r.payment)}</span>
          <span class="calc-row-months">${monthsLabel}</span>
          <span class="calc-row-interest">${fmt(r.interest)}</span>
        </div>`
      }).join('')

      const totalRow = `<div class="calc-total-row">
        <span>Total</span>
        <span style="color:var(--accent)">${fmt(perPaycheck)} / paycheck &nbsp;·&nbsp; ${fmt(perMonth)} / mo</span>
        <span style="color:var(--muted);font-size:0.78rem">${maxMonths < 9999 ? maxMonths + ' mo debt-free' : ''}</span>
        <span style="color:var(--red)">${fmt(totalInterestCost)} interest</span>
      </div>`

      const highestApr = rows[0]
      const strategy = extra > 0
        ? `<div class="calc-strategy">
            Avalanche strategy: minimums on all cards, extra <strong>${fmt(extra / 2)}/paycheck</strong> focused on
            <strong>${highestApr.c.name}</strong> (${highestApr.c.apr}% APR). Paid off in
            <strong>${highestApr.months} months</strong> — then that payment rolls to the next card.
          </div>`
        : `<div class="calc-strategy" style="border-color:rgba(255,77,77,0.2);background:rgba(255,77,77,0.05)">
            <strong style="color:var(--red)">Warning:</strong> ${fmt(perMonth)}/mo only covers minimums (~${fmt(totalMins)}/mo needed).
            Increase payment to make progress on principal.
          </div>`

      resultsEl.innerHTML = colHeaders + cardRows + totalRow + strategy
    }

    async function load() {
      const res = await fetch('/credit/data')
      if (res.status === 403) { location.href = '/'; return }
      const data = await res.json()
      const cc = data.creditSummary
      ccData = cc.cards ?? []
      renderMinInputs()

      document.getElementById('cc-total').textContent = fmts(cc.totalBalance)
      document.getElementById('cc-total').className = 'stat-value mono ' + utilColor(cc.totalUtilization)
      document.getElementById('cc-limit').textContent = fmts(cc.totalLimit)
      document.getElementById('cc-util').textContent = cc.totalUtilization + '%'
      document.getElementById('cc-util').className = 'stat-value mono ' + utilColor(cc.totalUtilization)
      document.getElementById('cc-interest').textContent = fmt(cc.totalMonthlyInterest)
      document.getElementById('cc-interest').className = 'stat-value mono ' + (cc.totalMonthlyInterest > 50 ? 'orange' : '')
      document.getElementById('cc-trend').innerHTML = trendChip(cc.trend)

      document.getElementById('cc-cards').innerHTML = cc.cards.length
        ? cc.cards.sort((a,b)=>b.utilization - a.utilization).map(c => `
          <div class="credit-card">
            <div class="credit-card-header">
              <div>
                <div class="credit-card-name">${c.name}</div>
                ${c.mask ? `<div class="credit-card-mask">···${c.mask}</div>` : ''}
              </div>
              <span class="badge badge-${utilColor(c.utilization)}">${c.utilization}%</span>
            </div>
            <div class="util-row">
              <span>Balance <span>${fmt(c.balance)}</span></span>
              <span>Limit <span>${fmt(c.limit)}</span></span>
            </div>
            <div class="progress">
              <div class="progress-fill ${barColor(c.utilization)}" style="width:${Math.min(c.utilization,100)}%"></div>
            </div>
            <div class="credit-stats">
              <div class="credit-stat">
                <div class="credit-stat-label">APR</div>
                <div class="credit-stat-value">${c.apr}%${c.isVariableRate ? ' <span style="color:var(--muted);font-size:0.7rem">variable</span>' : ''}</div>
              </div>
              <div class="credit-stat">
                <div class="credit-stat-label">Interest / mo</div>
                <div class="credit-stat-value ${c.monthlyInterest > 20 ? 'text-orange' : ''}">${fmt(c.monthlyInterest)}</div>
              </div>
              <div class="credit-stat">
                <div class="credit-stat-label">Payoff est.</div>
                <div class="credit-stat-value">${c.payoffMonths > 0 ? c.payoffMonths + ' mo' : '—'}</div>
              </div>
            </div>
          </div>`).join('')
        : '<div class="empty">No credit cards linked.</div>'

      const loans = data.loanSummary?.loans ?? []
      document.getElementById('loan-cards').innerHTML = loans.length
        ? loans.map(l => `
          <div class="loan-card">
            <div class="loan-header">
              <div>
                <div class="loan-name">${l.name}${l.mask ? ` ···${l.mask}` : ''}</div>
                ${l.subtype ? `<div class="loan-sub">${l.subtype}</div>` : ''}
              </div>
              <span class="stat-value mono" style="font-size:1.1rem">${fmts(l.currentBalance)}</span>
            </div>
            <div class="loan-stats">
              <div class="loan-stat">
                <div class="loan-stat-label">APR</div>
                <div class="loan-stat-value">${l.apr != null ? l.apr + '%' : '—'}</div>
              </div>
              <div class="loan-stat">
                <div class="loan-stat-label">Paid this year</div>
                <div class="loan-stat-value text-green">${l.principalPaidThisYear != null ? fmts(l.principalPaidThisYear) : '—'}</div>
              </div>
              <div class="loan-stat">
                <div class="loan-stat-label">Payoff est.</div>
                <div class="loan-stat-value">${l.projectedPayoffMonths != null ? l.projectedPayoffMonths + ' mo' : '—'}</div>
              </div>
            </div>
          </div>`).join('')
        : '<div class="empty">No loans linked.</div>'
    }

    load()
  </script>
</body>
</html>
